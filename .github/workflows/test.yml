name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=5m

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...

      - name: Coverage summary
        run: |
          echo "### Test Coverage" >> $GITHUB_STEP_SUMMARY
          go tool cover -func=coverage.txt >> $GITHUB_STEP_SUMMARY

      - name: API Coverage
        env:
          GIST_ID: ${{ secrets.GIST_ID }}
          GIST_SECRET: ${{ secrets.GIST_SECRET }}
        run: |
          pip install uv -q
          uv run --with pyyaml python3 scripts/check-api-coverage.py | tee docs/api-coverage.md >> $GITHUB_STEP_SUMMARY

      - name: Commit API coverage doc
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/api-coverage.md
          git diff --cached --quiet || git commit -m "chore(ci): update API coverage report [skip ci]"
          git push

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Build provider
        run: go build -v -o terraform-provider-kanidm

      - name: Verify binary
        run: |
          file terraform-provider-kanidm
          ./terraform-provider-kanidm --version || true

  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Check formatting
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "The following files are not formatted:"
            gofmt -s -l .
            exit 1
          fi

  mod-tidy:
    name: Mod Tidy Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

  acceptance:
    name: Acceptance Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Generate TLS certificate
        run: |
          mkdir -p testdata/kanidm
          openssl req -x509 -newkey rsa:2048 -nodes \
            -keyout testdata/kanidm/key.pem \
            -out testdata/kanidm/cert.pem \
            -days 1 \
            -subj "/CN=localhost" \
            -addext "subjectAltName=DNS:localhost,IP:127.0.0.1"

      - name: Start Kanidm
        run: docker compose up -d

      - name: Wait for Kanidm
        run: |
          for i in $(seq 1 30); do
            if curl -fsk https://localhost:8443/status > /dev/null 2>&1; then
              echo "Kanidm ready"; break
            fi
            [ "$i" -eq 30 ] && echo "Timeout" && exit 1
            sleep 2
          done

      - name: Initialize Kanidm
        run: bash scripts/setup-kanidm.sh

      - name: Run acceptance tests
        run: |
          source .env.test
          TF_ACC=1 TF_ACC_PROVIDER_HOST=registry.opentofu.org \
          go test -v -timeout 30m ./internal/provider/

      - name: Stop Kanidm
        if: always()
        run: docker compose down -v
